version: "3.8"

services:
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "yarn install && yarn dev"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true
